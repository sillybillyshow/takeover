<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TikTok Follower Count</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 50px;
    }
    #count {
      font-size: 5em;
      color: #FF0050;
    }
  </style>
</head>
<body>
  <h1>My TikTok Follower Count</h1>
  <div id="count">Loading...</div>

  <script>
    const workerURL = "https://tiktok-follower-api.sillybillyshowemail.workers.dev"; // Replace with your Worker URL

    async function updateFollowerCount() {
      try {
        const res = await fetch(workerURL);
        const data = await res.json();
        document.getElementById("count").textContent = data.followers.toLocaleString();
      } catch (err) {
        document.getElementById("count").textContent = "Error";
        console.error(err);
      }
    }

    updateFollowerCount();

    // Optional: auto-refresh every minute
    setInterval(updateFollowerCount, 60000);
  </script>
</body>
</html>
